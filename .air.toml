root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/otp-service ./cmd/api"
  bin = "./tmp/otp-service"
  delay = 200
  stop_on_error = true
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml", "json"]
  exclude_dir = ["tmp", "vendor", ".git", ".idea", ".vscode"]

[log]
  time = true
