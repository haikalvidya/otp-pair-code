services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: otp_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d otp_service"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/otp_service?sslmode=disable
      LOG_LEVEL: info
      REQUEST_TIMEOUT: 5s
      SHUTDOWN_TIMEOUT: 5s
      OTP_ALLOW_REISSUE: "false"
      OTP_MAX_FAILED_ATTEMPTS: "5"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
