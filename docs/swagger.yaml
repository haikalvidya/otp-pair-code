basePath: /
definitions:
  healthhttp.HealthData:
    properties:
      status:
        example: ok
        type: string
    type: object
  healthhttp.HealthResponse:
    properties:
      data:
        $ref: '#/definitions/healthhttp.HealthData'
      meta:
        $ref: '#/definitions/httpadapter.Meta'
    type: object
  httpadapter.ErrorBody:
    properties:
      code:
        example: otp_invalid
        type: string
      details:
        additionalProperties:
          type: string
        type: object
      message:
        example: OTP is invalid
        type: string
    type: object
  httpadapter.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/httpadapter.ErrorBody'
      meta:
        $ref: '#/definitions/httpadapter.Meta'
    type: object
  httpadapter.Meta:
    properties:
      request_id:
        example: 5f4dcc3b-5aa7
        type: string
    type: object
  otphttp.RequestOTPData:
    properties:
      otp:
        example: "61531"
        type: string
      user_id:
        example: Robert
        type: string
    type: object
  otphttp.RequestOTPRequest:
    properties:
      user_id:
        example: Robert
        type: string
    type: object
  otphttp.RequestOTPResponse:
    properties:
      data:
        $ref: '#/definitions/otphttp.RequestOTPData'
      meta:
        $ref: '#/definitions/httpadapter.Meta'
    type: object
  otphttp.ValidateOTPData:
    properties:
      message:
        example: OTP validated successfully.
        type: string
      user_id:
        example: Robert
        type: string
    type: object
  otphttp.ValidateOTPRequest:
    properties:
      otp:
        example: "61531"
        type: string
      user_id:
        example: Robert
        type: string
    type: object
  otphttp.ValidateOTPResponse:
    properties:
      data:
        $ref: '#/definitions/otphttp.ValidateOTPData'
      meta:
        $ref: '#/definitions/httpadapter.Meta'
    type: object
info:
  contact: {}
  description: OTP request and validation service.
  title: OTP Service API
  version: "1.0"
paths:
  /healthz:
    get:
      description: Check whether the service process is running.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/healthhttp.HealthResponse'
      summary: Health check
      tags:
      - health
  /otp/request:
    post:
      consumes:
      - application/json
      description: Generate a new OTP for a user based on the configured active-OTP
        policy.
      parameters:
      - description: Request OTP payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otphttp.RequestOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/otphttp.RequestOTPResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
      summary: Request OTP
      tags:
      - otp
  /otp/validate:
    post:
      consumes:
      - application/json
      description: Validate an OTP for a user.
      parameters:
      - description: Validate OTP payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/otphttp.ValidateOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/otphttp.ValidateOTPResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "410":
          description: Gone
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "429":
          description: Too Many Requests
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/httpadapter.ErrorResponse'
      summary: Validate OTP
      tags:
      - otp
schemes:
- http
swagger: "2.0"
